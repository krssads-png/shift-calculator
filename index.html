
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shift Calculator</title>
<style>
body{
    font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial;
    padding:20px;
    background:#0f0f10;
    color:#f2f2f2;
}
h1{font-size:24px}
.card{
    background:#1c1c1e;
    border-radius:14px;
    padding:16px;
    margin-bottom:14px;
}
label{font-size:14px;color:#c7c7cc}
input{
    padding:8px;
    margin-top:4px;
    margin-bottom:10px;
    width:100%;
    border-radius:8px;
    border:1px solid #333;
    background:#2c2c2e;
    color:white;
}
button{
    padding:10px 14px;
    border:none;
    border-radius:10px;
    background:#0a84ff;
    color:white;
    font-size:14px;
}
.delete{
    background:#ff453a;
    margin-top:6px;
}
.total{
    font-size:18px;
    font-weight:600;
}
.small{
    color:#a1a1a6;
    font-size:13px;
}
</style>
</head>
<body>

<h1>💰 Калькулятор смен</h1>

<div class="card">
<label>Ставка (€)</label>
<input id="rate" type="number" step="0.01" value="13.50">

<label>Ночная доплата (%) после 23:00</label>
<input id="bonus" type="number" value="25">

<label>Чаевые за час (€)</label>
<input id="tipsRate" type="number" step="0.01" value="0.50">
</div>

<div id="shifts"></div>

<button onclick="addShift()">+ Добавить смену</button>

<div class="card total">
<div>💵 Зарплата: <span id="pay">0</span> €</div>
<div>🪙 Чаевые: <span id="tips">0</span> €</div>
<div>🧾 Всего: <span id="total">0</span> €</div>
</div>

<script>
let shifts=[]

function addShift(){
    shifts.push({start:"19:00",end:"01:00"})
    render()
}

function removeShift(i){
    shifts.splice(i,1)
    render()
}

function hoursBetween(start,end){
    let [sh,sm]=start.split(":").map(Number)
    let [eh,em]=end.split(":").map(Number)

    let s=sh+sm/60
    let e=eh+em/60

    if(e<s) e+=24
    return e-s
}

function nightHours(start,end){
    let [sh,sm]=start.split(":").map(Number)
    let [eh,em]=end.split(":").map(Number)

    let s=sh+sm/60
    let e=eh+em/60

    if(e<s) e+=24

    let nightStart=23
    let night=0

    for(let t=s;t<e;t+=0.01){
        if((t%24)>=nightStart) night+=0.01
    }

    return night
}

function render(){

let container=document.getElementById("shifts")
container.innerHTML=""

shifts.forEach((shift,i)=>{

let div=document.createElement("div")
div.className="card"

div.innerHTML=`
<label>Начало</label>
<input type="time" value="${shift.start}" onchange="updateStart(${i},this.value)">

<label>Конец</label>
<input type="time" value="${shift.end}" onchange="updateEnd(${i},this.value)">

<button class="delete" onclick="removeShift(${i})">Удалить</button>
`

container.appendChild(div)
})

calculate()
}

function updateStart(i,val){
shifts[i].start=val
calculate()
}

function updateEnd(i,val){
shifts[i].end=val
calculate()
}

function calculate(){

let rate=parseFloat(document.getElementById("rate").value)
let bonus=parseFloat(document.getElementById("bonus").value)/100
let tipsRate=parseFloat(document.getElementById("tipsRate").value)

let nightRate=rate*(1+bonus)

let pay=0
let tips=0

shifts.forEach(s=>{

let totalHours=hoursBetween(s.start,s.end)
let night=nightHours(s.start,s.end)
let normal=totalHours-night

pay+=normal*rate + night*nightRate
tips+=totalHours*tipsRate

})

document.getElementById("pay").innerText=pay.toFixed(2)
document.getElementById("tips").innerText=tips.toFixed(2)
document.getElementById("total").innerText=(pay+tips).toFixed(2)

}

addShift()
</script>

</body>
</html>
